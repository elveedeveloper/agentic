# Jira `agent-ready` label → repository_dispatch → autonomous draft PR.
# See node template (claude-from-jira.yml) for the Jira automation rule setup.

name: claude-from-jira

on:
  repository_dispatch:
    types: [jira-ticket-ready]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.JIRA_DISPATCH_PAT || github.token }}

      - name: Create feature branch
        env:
          TICKET: ${{ github.event.client_payload.ticket_key }}
          SUMMARY: ${{ github.event.client_payload.summary }}
        run: |
          SLUG=$(echo "$SUMMARY" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g' | cut -c1-40)
          BRANCH="${TICKET}/${SLUG}"
          git checkout -b "$BRANCH"
          git config user.name  "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet restore

      - name: Claude develops the ticket
        uses: anthropics/claude-code-action@v1   # VERIFY current tag
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Pick up Jira ticket ${{ github.event.client_payload.ticket_key }}.

            Summary:     ${{ github.event.client_payload.summary }}
            Description: ${{ github.event.client_payload.description }}

            Process:
            1. Read CLAUDE.md and the .editorconfig before planning.
            2. Plan the change — write a one-paragraph plan into the PR body.
            3. Implement with xUnit tests first when AC is measurable.
            4. Run: `dotnet format --verify-no-changes && dotnet build -c Release && dotnet test -c Release`. Iterate until green.
            5. Conventional Commits with ticket key:
               `feat(scope): description (${{ github.event.client_payload.ticket_key }})`
            6. Push to origin/$BRANCH.
            7. Open DRAFT PR with `gh pr create --draft` — body includes ticket link, plan, test plan, open questions.

            Hard rules:
            - DRAFT PR only. Never merge. Never force-push.
            - Never modify .github/workflows/, Directory.Build.props, .editorconfig, *.csproj package versions.
            - Scope too big (>1 project or >400 lines)? Open a draft PR with an empty commit explaining the ticket needs splitting. Do not implement.
          allowed_tools: "Read,Edit,Write,MultiEdit,Grep,Glob,Bash(dotnet:*),Bash(git:*),Bash(gh:*)"
